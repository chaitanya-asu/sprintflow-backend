# SprintFlow — Local Development Docker Compose
#
# Assumes the frontend repo is at ../sprintflow-frontend relative to this file.
# If your repos are in different locations, set FRONTEND_PATH in .env.
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d --build
#
# Services:
#   mysql    — MySQL 8, port 3306 (exposed for local debugging tools)
#   backend  — Spring Boot 3.2 / Java 21, port 8080
#   frontend — Nginx serving React build, port 80

services:

  mysql:
    image: mysql:8.0
    container_name: sprintflow-mysql-local
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: sprintflow_db
      MYSQL_USER: sprintflow
      MYSQL_PASSWORD: ${DB_PASSWORD:-sprintflow123}

    volumes:
      - mysql_data_local:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./MASTER_SEED.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sprintflow", "-psprintflow123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - sprintflow-net-local

    deploy:
      resources:
        limits:
          memory: 768M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sprintflow-backend-local
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      DB_URL: jdbc:mysql://mysql:3306/sprintflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: sprintflow
      DB_PASSWORD: sprintflow123
      # Use 'update' for local dev so Flyway migrations also run
      DDL_AUTO: ${DDL_AUTO:-update}

      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_MAIL_KEY: ${APP_MAIL_KEY}

      # CORS — allow all localhost variants
      APP_CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173,http://localhost:5174
      APP_FRONTEND_URL: http://localhost:5173

      SWAGGER_ENABLED: "true"
      RATE_LIMIT_ENABLED: "false"

      JAVA_OPTS: "-Xms256m -Xmx768m"

    ports:
      - "8080:8080"

    networks:
      - sprintflow-net-local

    deploy:
      resources:
        limits:
          memory: 1024M

  frontend:
    build:
      # Relative path — assumes frontend repo is a sibling directory
      context: ${FRONTEND_PATH:-../sprintflow-frontend}
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_URL: ""
        VITE_USE_MOCK: "false"

    container_name: sprintflow-frontend-local
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

    networks:
      - sprintflow-net-local

    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mysql_data_local:
    driver: local

networks:
  sprintflow-net-local:
    driver: bridge
