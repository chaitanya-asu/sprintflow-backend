# SprintFlow — Single Server Docker Compose
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose up -d --build
#
# Services:
#   mysql    — MySQL 8, data persisted in named volume
#   backend  — Spring Boot 3.2 / Java 21, port 8080 (internal only)
#   frontend — Nginx serving React build + proxying /api and /ws, ports 80/443

services:

  # ── MySQL 8 ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sprintflow-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      sprintflow_db
      MYSQL_USER:          sprintflow
      MYSQL_PASSWORD:      ${DB_PASSWORD:-sprintflow123}

    volumes:
      # Persist database data across container restarts
      - mysql_data:/var/lib/mysql
      # Auto-initialize schema on first start
      # MySQL runs all .sql files in this folder on first boot (when data volume is empty)
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./MASTER_SEED.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "sprintflow", "-psprintflow123"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s

    # Not exposed to host — backend connects via Docker network
    networks:
      - sprintflow-net

    # Memory limit — MySQL for local development
    deploy:
      resources:
        limits:
          memory: 768M

  # ── Spring Boot Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sprintflow-backend
    restart: unless-stopped

    # Wait for MySQL to be healthy before starting
    depends_on:
      mysql:
        condition: service_healthy

    environment:
      # Database — connects to mysql service by container name
      DB_URL:      jdbc:mysql://mysql:3306/sprintflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: sprintflow
      DB_PASSWORD: sprintflow123
      DDL_AUTO:    ${DDL_AUTO:-update}

      # Security
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_MAIL_KEY:   ${APP_MAIL_KEY}

      # CORS — frontend Nginx container is the only allowed origin
      # In production this is https://YOUR_SERVER_IP (the Nginx HTTPS port)
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}

      # Rate limiting — enable in production
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}

      # Swagger — disable in production
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}

      # JVM tuning for local development
      JAVA_OPTS: "-Xms256m -Xmx768m"

    # Port 8080 is NOT exposed to the host — only accessible inside Docker network
    # Nginx proxies /api and /ws to this container
    expose:
      - "8080"

    networks:
      - sprintflow-net

    deploy:
      resources:
        limits:
          memory: 1024M

  # ── Nginx Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ${FRONTEND_PATH:-../sprintflow-frontend}
      dockerfile: Dockerfile
      args:
        # These are baked into the React build at image build time
        # VITE_API_BASE_URL must be the public URL the BROWSER uses to reach the API
        # Since Nginx proxies /api → backend, the browser calls https://YOUR_IP/api
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_URL:       ${VITE_WS_URL}
        VITE_USE_MOCK:     "false"

    container_name: sprintflow-frontend
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      # Expose HTTP only for now
      - "80:80"

    volumes:
      # Mount SSL certificates generated on the host into Nginx
      - ./docker/ssl:/etc/nginx/ssl:ro

    networks:
      - sprintflow-net

    deploy:
      resources:
        limits:
          memory: 128M

# ── Named volumes ────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Internal network ─────────────────────────────────────────
networks:
  sprintflow-net:
    driver: bridge
