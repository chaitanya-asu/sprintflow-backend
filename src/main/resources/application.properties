# ─────────────────────────────────────────────────────────────
# SprintFlow Backend — application.properties
# ─────────────────────────────────────────────────────────────

server.port=8080
spring.application.name=sprintflow-backend

# ── Database (MySQL) ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/sprintflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────
# Must match JwtTokenProvider @Value key: app.jwt.secret
app.jwt.secret=SprintFlowSecretKeyForJwtTokenValidationAndGenerationProcess2024
app.jwt.expiration=86400000

# ── Jackson ───────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false

# ── Mail (optional — credentials email) ──────────────────────
# Uncomment and configure to enable email sending
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ───────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.sprintflow=DEBUG

# ── Encoding ──────────────────────────────────────────────────
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# ── Error handling ────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always
