# ─────────────────────────────────────────────────────────────
# SprintFlow Backend — application.properties
#
# All sensitive values MUST be set as environment variables on EC2.
# Fallback values are for LOCAL DEVELOPMENT ONLY.
#
# Required env vars on EC2:
#   APP_JWT_SECRET   — openssl rand -hex 32   (64 hex chars = 256 bits)
#   APP_MAIL_KEY     — openssl rand -hex 16   (32 hex chars = 128 bits)
#   DB_USERNAME      — your MySQL user (e.g. sprintflow)
#   DB_PASSWORD      — your MySQL password
#   APP_CORS_ORIGINS — https://YOUR_CLOUDFRONT_DOMAIN.cloudfront.net
#   APP_FRONTEND_URL — https://YOUR_CLOUDFRONT_DOMAIN.cloudfront.net
#   DDL_AUTO         — validate  (NEVER update/create in production)
# ─────────────────────────────────────────────────────────────

server.port=${PORT:8080}
spring.application.name=sprintflow-backend

# Exclude default UserDetailsService auto-config (we use JWT)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ── Database ──────────────────────────────────────────────────
# Production: set DB_URL, DB_USERNAME, DB_PASSWORD as env vars on EC2
# Local dev:  uses localhost MySQL with root (change as needed)
# NOTE: createDatabaseIfNotExist removed — DB must exist before startup
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sprintflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — tuned for t2.micro (1 vCPU, 1 GB RAM)
# Rule of thumb: pool size = (2 * CPU cores) + effective_spindle_count = 3
spring.datasource.hikari.pool-name=SprintFlowPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# ── JPA / Hibernate ───────────────────────────────────────────
# Production: DDL_AUTO=validate — Hibernate checks schema but never modifies it
# Local dev:  DDL_AUTO=update   — Hibernate auto-creates/alters tables
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Explicit dialect avoids deprecation warnings with MySQL 8 + Hibernate 6
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────
# REQUIRED: set APP_JWT_SECRET on EC2 — must be at least 64 hex chars (256 bits)
# Generate: openssl rand -hex 32
# The fallback below is intentionally invalid — app will fail fast if env var is missing
app.jwt.secret=${APP_JWT_SECRET:REPLACE_WITH_64_CHAR_HEX_STRING_SEE_README}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ── Jackson ───────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── Error handling — never expose internals ───────────────────
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ── Encoding ──────────────────────────────────────────────────
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ── Logging ───────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.sprintflow=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.mail=WARN
logging.level.com.sun.mail=WARN
# Suppress Hibernate SQL noise in production
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# ── Mail — SMTP credentials stored encrypted per-manager in DB ─
# REQUIRED: set APP_MAIL_KEY on EC2 — must be exactly 32 hex chars (128 bits)
# Generate: openssl rand -hex 16
app.mail.encryption-key=${APP_MAIL_KEY:REPLACE_WITH_32_CHAR_HEX_STRING_SEE_README}
# Frontend URL used in password reset and credential emails
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# ── CORS ──────────────────────────────────────────────────────
# Production: APP_CORS_ORIGINS=https://YOUR_CLOUDFRONT_DOMAIN.cloudfront.net
# Local dev:  all localhost origins allowed
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# ── Async thread pool (used by @Async email sending) ──────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=sprintflow-async-

# ── Actuator ──────────────────────────────────────────────────
# Only expose health endpoint — info disabled in production to avoid leaking env data
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.info.env.enabled=false
info.app.name=SprintFlow
info.app.version=1.0.0

# ── Swagger / OpenAPI ─────────────────────────────────────────
# PRODUCTION: set SWAGGER_ENABLED=false to hide API docs from public
# Local dev:  true (useful for testing)
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.defaultModelsExpandDepth=-1
