# SprintFlow Backend - application.properties

server.port=${PORT:8080}
spring.application.name=sprintflow-backend

# Exclude auto-configs
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ── Database — set DB_URL / DB_USERNAME / DB_PASSWORD on AWS (RDS endpoint) ──
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sprintflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=SprintFlowPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# ── JPA / Hibernate ──
# PRODUCTION: set DDL_AUTO=validate (never let Hibernate modify schema)
# LOCAL DEV:  DDL_AUTO=update is fine
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
# open-in-view=false avoids lazy-loading issues and is safer for REST APIs
spring.jpa.open-in-view=false

# ── JWT — REQUIRED on production: set APP_JWT_SECRET env var to a 64-char random string ──
# Generate with: openssl rand -hex 32
# NEVER use the fallback in production — it is only for local dev
app.jwt.secret=${APP_JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_ENV_VAR}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Error handling — never expose internals
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ── Logging — set MAIL_LOG_LEVEL=WARN on AWS to suppress mail debug noise ──
logging.level.root=WARN
logging.level.com.sprintflow=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework.mail=${MAIL_LOG_LEVEL:WARN}
logging.level.com.sun.mail=${MAIL_LOG_LEVEL:WARN}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# ── Mail — SMTP credentials stored per-manager in DB ──
# Set APP_MAIL_KEY to a 32-char random string on AWS (used to AES-encrypt stored passwords)
# Generate with: openssl rand -hex 16
# NEVER use the fallback in production
app.mail.encryption-key=${APP_MAIL_KEY:CHANGE_ME_IN_PRODUCTION_USE_ENV_VAR}
# Frontend URL used in credential emails — set APP_FRONTEND_URL on AWS to your CloudFront domain
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# ── CORS — set APP_CORS_ORIGINS on AWS to your CloudFront domain ──
# Example: APP_CORS_ORIGINS=https://d1234abcd.cloudfront.net
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=true
info.app.name=SprintFlow
info.app.version=1.0.0

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.defaultModelsExpandDepth=-1
