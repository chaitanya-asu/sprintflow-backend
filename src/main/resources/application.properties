# SprintFlow Backend - application.properties

server.port=8080
spring.application.name=sprintflow-backend

# Exclude auto-configs
# NOTE: Mail auto-config is intentionally NOT excluded — EmailService builds
# JavaMailSender dynamically per-manager from DB credentials.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration

# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/sprintflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=SprintFlowPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA / Hibernate
# spring.jpa.database-platform is intentionally omitted - Hibernate auto-detects MySQL dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# JWT
app.jwt.secret=${APP_JWT_SECRET:SprintFlow@2024#SecureKey!XyZ$PqR&MnB*VwT^LkJ%HgF@DsA!QeW}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Error handling
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Logging
logging.level.root=WARN
logging.level.com.sprintflow=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=INFO

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# ── Mail (dynamic per-manager — no static credentials needed) ────────────────
# SMTP credentials are stored per MANAGER user in the DB (smtp_email / smtp_password).
# The manager sets them once via PUT /api/auth/mail-config from their Profile page.
# EmailService builds a JavaMailSender on-the-fly from those DB credentials.
#
# Supported providers (STARTTLS on port 587):
#   Gmail   : smtp.gmail.com   — use a Google App Password (not your login password)
#   Outlook : smtp.office365.com
#   Yahoo   : smtp.mail.yahoo.com
#
# To use Gmail:
#   1. Enable 2-Step Verification on the Google account
#   2. Go to https://myaccount.google.com/apppasswords
#   3. Generate an App Password for "Mail"
#   4. Enter that 16-char password (no spaces) in the Profile → Mail Settings form
#
# Encryption key for SMTP passwords stored in DB (change before deploying to prod)
app.mail.encryption-key=${APP_MAIL_KEY:SprintFlow#MailKey@2024!}

# CORS (comma-separated, no spaces)
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=true
info.app.name=SprintFlow
info.app.version=1.0.0

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.defaultModelsExpandDepth=-1
